<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0c2a"/>
      <stop offset="45%" stop-color="#1b1840"/>
      <stop offset="100%" stop-color="#241b4f"/>
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD56B"/>
      <stop offset="100%" stop-color="#FF7A45"/>
    </linearGradient>

    <radialGradient id="ballGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FF9A8B"/>
      <stop offset="55%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#8E1B2E"/>
    </radialGradient>

    <filter id="blurSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="6" dy="10" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="300" rx="26" fill="url(#bgGrad)"/>

  <!-- floating glow orbs (depth layer) -->
  <circle cx="150" cy="70" r="70" fill="#2DD4BF" opacity="0.22" filter="url(#blurSoft)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 18,12; 0,0" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1040" cy="230" r="95" fill="#F2A65A" opacity="0.20" filter="url(#blurSoft)">
    <animateTransform attributeName="transform" type="translate" values="0,0; -14,-10; 0,0" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="260" r="55" fill="#A78BFA" opacity="0.18" filter="url(#blurSoft)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 10,-14; 0,0" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- twinkling stars -->
  <g fill="#FFFFFF">
    <circle cx="640" cy="40" r="1.6" opacity="0.6"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="90" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="50" r="1.8" opacity="0.7"><animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="35" r="1.4" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="60" r="1.5" opacity="0.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="260" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="1180" cy="200" r="1.6" opacity="0.6"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- 3D extruded text "SHAM" (stacked offset layers fake the depth/bevel) -->
  <g font-family="'Trebuchet MS', Verdana, Arial, sans-serif" font-weight="700" font-size="108" letter-spacing="4">
    <text x="88" y="200" fill="#0a0920">SHAM</text>
    <text x="85" y="197" fill="#120f33">SHAM</text>
    <text x="82" y="194" fill="#1a1748">SHAM</text>
    <text x="79" y="191" fill="#241f5e">SHAM</text>
    <text x="76" y="188" fill="#2d2774">SHAM</text>
    <text x="72" y="184" fill="url(#goldGrad)" filter="url(#dropShadow)" stroke="#FFF3D6" stroke-width="0.6" stroke-opacity="0.5">SHAM</text>
  </g>

  <!-- handle + tagline -->
  <text x="76" y="222" font-family="'Courier New', monospace" font-size="22" fill="#7DE3D6" opacity="0.9">&lt;Shxam/&gt;</text>
  <text x="76" y="255" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="19" fill="#C9D1D9">AI / ML Engineer&#160;&#160;•&#160;&#160;NLP&#160;&#160;•&#160;&#160;Full-Stack Builder</text>

  <!-- thin accent divider -->
  <rect x="76" y="266" width="180" height="3" rx="1.5" fill="url(#goldGrad)"/>

  <!-- orbiting cricket ball (hidden path) -->
  <path id="orbitPath" d="M 1080,150 a130,55 0 1,0 -260,0 a130,55 0 1,0 260,0" fill="none" stroke="none"/>
  <g>
    <animateMotion dur="7s" repeatCount="indefinite">
      <mpath href="#orbitPath"/>
    </animateMotion>
    <circle cx="0" cy="0" r="15" fill="url(#ballGrad)"/>
    <path d="M -8,-9 Q 0,0 -8,9" stroke="#FFFFFF" stroke-width="1.3" fill="none" opacity="0.85"/>
    <path d="M 8,-9 Q 0,0 8,9" stroke="#FFFFFF" stroke-width="1.3" fill="none" opacity="0.85"/>
  </g>

  <!-- small neural-net node cluster (AI motif), gently bobbing -->
  <g transform="translate(740,235)" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="740,235; 740,225; 740,235" dur="5s" repeatCount="indefinite" additive="sum"/>
    <line x1="0" y1="0" x2="34" y2="-18" stroke="#2DD4BF" stroke-width="1.2" opacity="0.6"/>
    <line x1="0" y1="0" x2="34" y2="14" stroke="#2DD4BF" stroke-width="1.2" opacity="0.6"/>
    <line x1="34" y1="-18" x2="68" y2="0" stroke="#F2A65A" stroke-width="1.2" opacity="0.6"/>
    <line x1="34" y1="14" x2="68" y2="0" stroke="#F2A65A" stroke-width="1.2" opacity="0.6"/>
    <circle cx="0" cy="0" r="5" fill="#2DD4BF"/>
    <circle cx="34" cy="-18" r="5" fill="#A78BFA"/>
    <circle cx="34" cy="14" r="5" fill="#A78BFA"/>
    <circle cx="68" cy="0" r="6" fill="#F2A65A"/>
  </g>
</svg>
