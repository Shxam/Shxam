<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1330"/>
      <stop offset="48%" stop-color="#3c2150"/>
      <stop offset="100%" stop-color="#6e2f55"/>
    </linearGradient>

    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE9C7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFE9C7" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="petalGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE9F1"/>
      <stop offset="100%" stop-color="#FF9EBD"/>
    </linearGradient>

    <linearGradient id="petalGradDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB7CE"/>
      <stop offset="100%" stop-color="#E8638A"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF1F6"/>
      <stop offset="100%" stop-color="#FF9CC0"/>
    </linearGradient>

    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9EBD"/>
      <stop offset="100%" stop-color="#FFD98E"/>
    </linearGradient>

    <filter id="blurSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="5" dy="9" stdDeviation="5" flood-color="#1a0f24" flood-opacity="0.55"/>
    </filter>

    <path id="petal" d="M0,-18 C6,-13 7,-5 0,1 C-7,-5 -6,-13 0,-18 Z"/>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="300" rx="26" fill="url(#bgGrad)"/>

  <!-- moon glow -->
  <circle cx="1075" cy="55" r="85" fill="url(#moonGlow)" filter="url(#blurSoft)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1075" cy="55" r="26" fill="#FFF6E5" opacity="0.9"/>

  <!-- soft dusk stars -->
  <g fill="#FFF1E0">
    <circle cx="640" cy="35" r="1.5" opacity="0.6"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="55" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="30" r="1.6" opacity="0.6"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="45" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="3.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- blossom branch -->
  <g>
    <path d="M28,300 C56,232 86,182 138,150 C168,131 200,112 252,96"
          fill="none" stroke="#3a2230" stroke-width="6" stroke-linecap="round"/>
    <path d="M138,150 C158,130 176,110 198,80"
          fill="none" stroke="#3a2230" stroke-width="3.4" stroke-linecap="round"/>
    <g><use href="#petal" transform="rotate(1.7,250,95) translate(250,90.1) scale(0.434)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(70.5,250,95) translate(250,90.1) scale(0.434)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(144.6,250,95) translate(250,90.1) scale(0.434)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(210.8,250,95) translate(250,90.1) scale(0.434)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(282.7,250,95) translate(250,90.1) scale(0.434)" fill="url(#petalGradLight)" opacity="0.95"/><circle cx="250" cy="95" r="3.0199999999999996" fill="#FFD98E"/><animate attributeName="opacity" values="0.9;1;0.9" dur="5s" repeatCount="indefinite"/></g><g><use href="#petal" transform="rotate(-3.5,196,80) translate(196,76.15) scale(0.341)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(74.2,196,80) translate(196,76.15) scale(0.341)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(143.1,196,80) translate(196,76.15) scale(0.341)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(213.8,196,80) translate(196,76.15) scale(0.341)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(289.0,196,80) translate(196,76.15) scale(0.341)" fill="url(#petalGradLight)" opacity="0.95"/><circle cx="196" cy="80" r="2.63" fill="#FFD98E"/><animate attributeName="opacity" values="0.9;1;0.9" dur="6s" repeatCount="indefinite"/></g><g><use href="#petal" transform="rotate(-0.6,146,148) translate(146,143.45) scale(0.403)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(69.6,146,148) translate(146,143.45) scale(0.403)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(147.5,146,148) translate(146,143.45) scale(0.403)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(218.4,146,148) translate(146,143.45) scale(0.403)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(284.9,146,148) translate(146,143.45) scale(0.403)" fill="url(#petalGradLight)" opacity="0.95"/><circle cx="146" cy="148" r="2.89" fill="#FFD98E"/><animate attributeName="opacity" values="0.9;1;0.9" dur="7s" repeatCount="indefinite"/></g><g><use href="#petal" transform="rotate(0.9,96,180) translate(96,176.5) scale(0.31)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(72.3,96,180) translate(96,176.5) scale(0.31)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(148.5,96,180) translate(96,176.5) scale(0.31)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(218.8,96,180) translate(96,176.5) scale(0.31)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(285.5,96,180) translate(96,176.5) scale(0.31)" fill="url(#petalGradLight)" opacity="0.95"/><circle cx="96" cy="180" r="2.5" fill="#FFD98E"/><animate attributeName="opacity" values="0.9;1;0.9" dur="5.5s" repeatCount="indefinite"/></g>
  </g>

  <!-- 3D extruded "SHAM" text, sakura palette -->
  <g font-family="'Trebuchet MS', Verdana, Arial, sans-serif" font-weight="700" font-size="108" letter-spacing="4">
    <text x="88" y="200" fill="#190f22">SHAM</text>
    <text x="85" y="197" fill="#251530">SHAM</text>
    <text x="82" y="194" fill="#321b3e">SHAM</text>
    <text x="79" y="191" fill="#40224c">SHAM</text>
    <text x="76" y="188" fill="#4e2a5a">SHAM</text>
    <text x="72" y="184" fill="url(#textGrad)" filter="url(#dropShadow)" stroke="#FFF6F0" stroke-width="0.6" stroke-opacity="0.5">SHAM</text>
  </g>

  <!-- handle + tagline -->
  <text x="76" y="222" font-family="'Courier New', monospace" font-size="22" fill="#F4C9A0" opacity="0.92">&lt;Shxam/&gt;</text>
  <text x="76" y="255" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="19" fill="#F3D9E4">AI / ML Engineer&#160;&#160;•&#160;&#160;NLP&#160;&#160;•&#160;&#160;Full-Stack Builder</text>

  <rect x="76" y="266" width="180" height="3" rx="1.5" fill="url(#dividerGrad)"/>

  <!-- slow-drifting orbiting blossom -->
  <path id="orbitPath" d="M 1080,150 a130,55 0 1,0 -260,0 a130,55 0 1,0 260,0" fill="none" stroke="none"/>
  <g opacity="0.95">
    <animateMotion dur="11s" repeatCount="indefinite">
      <mpath href="#orbitPath"/>
    </animateMotion>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="9s" repeatCount="indefinite"/>
      <g><use href="#petal" transform="rotate(5.8,0,0) translate(0,-5.95) scale(0.527)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(67.4,0,0) translate(0,-5.95) scale(0.527)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(143.0,0,0) translate(0,-5.95) scale(0.527)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(219.1,0,0) translate(0,-5.95) scale(0.527)" fill="url(#petalGradLight)" opacity="0.95"/><use href="#petal" transform="rotate(283.8,0,0) translate(0,-5.95) scale(0.527)" fill="url(#petalGradLight)" opacity="0.95"/><circle cx="0" cy="0" r="3.41" fill="#FFD98E"/><animate attributeName="opacity" values="0.9;1;0.9" dur="5s" repeatCount="indefinite"/></g>
    </g>
  </g>

  <!-- AI neural-node motif, sakura-tinted -->
  <g transform="translate(740,225)" opacity="0.82">
    <animateTransform attributeName="transform" type="translate" values="740,225; 740,215; 740,225" dur="5s" repeatCount="indefinite" additive="sum"/>
    <line x1="0" y1="0" x2="34" y2="-18" stroke="#FFC2D6" stroke-width="1.2" opacity="0.55"/>
    <line x1="0" y1="0" x2="34" y2="14" stroke="#FFC2D6" stroke-width="1.2" opacity="0.55"/>
    <line x1="34" y1="-18" x2="68" y2="0" stroke="#FFD98E" stroke-width="1.2" opacity="0.55"/>
    <line x1="34" y1="14" x2="68" y2="0" stroke="#FFD98E" stroke-width="1.2" opacity="0.55"/>
    <circle cx="0" cy="0" r="5" fill="#FFC2D6"/>
    <circle cx="34" cy="-18" r="5" fill="#E8A6C8"/>
    <circle cx="34" cy="14" r="5" fill="#E8A6C8"/>
    <circle cx="68" cy="0" r="6" fill="#FFD98E"/>
  </g>

  <!-- falling sakura petals -->
  <g transform="translate(40,-20) scale(0.78)" opacity="0.92">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="-18,-20; 14,30; -10,80; 16,130; -8,180; 10,230; 0,320" dur="10.1s" begin="-0.0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" additive="sum"
      values="0;360" dur="6.6s" begin="-0.0s" repeatCount="indefinite"/>
    <use href="#petal" fill="url(#petalGradLight)"/>
  </g>
  <g transform="translate(160,-20) scale(0.6)" opacity="0.92">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="-18,-20; 14,30; -10,80; 16,130; -8,180; 10,230; 0,320" dur="12.8s" begin="-1.37s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" additive="sum"
      values="0;360" dur="5.5s" begin="-1.37s" repeatCount="indefinite"/>
    <use href="#petal" fill="url(#petalGradDeep)"/>
  </g>
  <g transform="translate(300,-20) scale(0.59)" opacity="0.92">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="-18,-20; 14,30; -10,80; 16,130; -8,180; 10,230; 0,320" dur="12.6s" begin="-2.74s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" additive="sum"
      values="0;360" dur="4.1s" begin="-2.74s" repeatCount="indefinite"/>
    <use href="#petal" fill="url(#petalGradLight)"/>
  </g>
  <g transform="translate(430,-20) scale(0.85)" opacity="0.92">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="-18,-20; 14,30; -10,80; 16,130; -8,180; 10,230; 0,320" dur="9.5s" begin="-4.11s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" additive="sum"
      values="0;360" dur="4.4s" begin="-4.11s" repeatCount="indefinite"/>
    <use href="#petal" fill="url(#petalGradDeep)"/>
  </g>
  <g transform="translate(560,-20) scale(0.85)" opacity="0.92">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="-18,-20; 14,30; -10,80; 16,130; -8,180; 10,230; 0,320" dur="14.8s" begin="-5.48s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" additive="sum"
      values="0;360" dur="4.5s" begin="-5.48s" repeatCount="indefinite"/>
    <use href="#petal" fill="url(#petalGradLight)"/>
  </g>
  <g transform="translate(700,-20) scale(0.71)" opacity="0.92">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="-18,-20; 14,30; -10,80; 16,130; -8,180; 10,230; 0,320" dur="13.4s" begin="-6.85s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" additive="sum"
      values="0;360" dur="7.8s" begin="-6.85s" repeatCount="indefinite"/>
    <use href="#petal" fill="url(#petalGradDeep)"/>
  </g>
  <g transform="translate(830,-20) scale(0.95)" opacity="0.92">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="-18,-20; 14,30; -10,80; 16,130; -8,180; 10,230; 0,320" dur="11.8s" begin="-8.22s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" additive="sum"
      values="0;360" dur="7.9s" begin="-8.22s" repeatCount="indefinite"/>
    <use href="#petal" fill="url(#petalGradLight)"/>
  </g>
  <g transform="translate(960,-20) scale(0.58)" opacity="0.92">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="-18,-20; 14,30; -10,80; 16,130; -8,180; 10,230; 0,320" dur="15.0s" begin="-9.59s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" additive="sum"
      values="0;360" dur="5.2s" begin="-9.59s" repeatCount="indefinite"/>
    <use href="#petal" fill="url(#petalGradDeep)"/>
  </g>
  <g transform="translate(1080,-20) scale(0.65)" opacity="0.92">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="-18,-20; 14,30; -10,80; 16,130; -8,180; 10,230; 0,320" dur="9.8s" begin="-10.96s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" additive="sum"
      values="0;360" dur="5.2s" begin="-10.96s" repeatCount="indefinite"/>
    <use href="#petal" fill="url(#petalGradLight)"/>
  </g>
  <g transform="translate(1150,-20) scale(1.12)" opacity="0.92">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="-18,-20; 14,30; -10,80; 16,130; -8,180; 10,230; 0,320" dur="10.3s" begin="-12.33s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" additive="sum"
      values="0;360" dur="6.3s" begin="-12.33s" repeatCount="indefinite"/>
    <use href="#petal" fill="url(#petalGradDeep)"/>
  </g>
</svg>
